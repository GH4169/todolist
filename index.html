<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111513">
  <title>Todolist</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>
  <div class="particles" id="particles"></div>

  <main class="auth-view" id="authView">
    <section class="auth-panel" aria-labelledby="authTitle">
      <div class="auth-brand-lockup">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="m7 12 3 3 7-7"/><path d="M19 12a7 7 0 1 1-4.1-6.4"/></svg>
        </div>
        <div class="auth-brand">
          <h1 id="authTitle">Todolist</h1>
          <p>继续你的今日清单</p>
        </div>
      </div>
      <form class="auth-form" id="authForm">
        <label for="authEmail">邮箱</label>
        <input id="authEmail" name="email" type="email" autocomplete="email" required placeholder="name@company.com">
        <div class="auth-label-row">
          <label for="authPassword">密码</label>
          <button class="auth-link" id="forgotPasswordBtn" type="button">忘记密码？</button>
        </div>
        <input id="authPassword" name="password" type="password" autocomplete="current-password" minlength="6" required placeholder="至少 6 位密码">
        <div class="auth-actions">
          <button class="auth-primary" id="loginBtn" type="submit">登录</button>
          <button class="auth-secondary" id="registerBtn" type="button">注册</button>
        </div>
        <p class="auth-message" id="authMessage" role="status" aria-live="polite"></p>
      </form>

      <form class="auth-form recovery-form" id="recoveryForm" hidden aria-labelledby="recoveryTitle">
        <div class="recovery-heading">
          <h2 id="recoveryTitle">设置新密码</h2>
        </div>
        <label for="newPassword">新密码</label>
        <input id="newPassword" name="new-password" type="password" autocomplete="new-password" minlength="6" required placeholder="至少 6 位密码">
        <label for="confirmPassword">确认新密码</label>
        <input id="confirmPassword" name="confirm-password" type="password" autocomplete="new-password" minlength="6" required placeholder="再次输入新密码">
        <div class="auth-actions auth-actions-single">
          <button class="auth-primary" id="updatePasswordBtn" type="submit">确认修改</button>
        </div>
        <p class="auth-message" id="recoveryMessage" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <div class="app-layout" id="appView" hidden>
    <div class="app-inner">
      <!-- 主列 -->
      <div class="main-col">
        <div class="workspace-overview">
          <div class="header">
            <div class="title-lockup">
              <div class="brand-mark" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="m7 12 3 3 7-7"/><path d="M19 12a7 7 0 1 1-4.1-6.4"/></svg>
              </div>
              <div>
                <p class="workspace-label">今日清单</p>
                <h1>Todolist</h1>
                <p class="subtitle">专注此刻，逐项完成</p>
              </div>
            </div>
            <div class="user-session">
              <span id="userEmail"></span>
              <button id="logoutBtn" type="button" title="退出登录" aria-label="退出登录">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/><path d="M14 4h4a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-4"/></svg>
              </button>
            </div>
          </div>

          <!-- 进度环 -->
          <div class="progress-ring" role="status" aria-label="任务完成率">
            <div class="ring-wrapper">
              <svg viewBox="0 0 140 140" aria-hidden="true">
                <circle class="bg" cx="70" cy="70" r="60" />
                <circle class="fill" id="progressCircle" cx="70" cy="70" r="60"
                        stroke-dasharray="377" stroke-dashoffset="377" />
              </svg>
              <div class="progress-text">
                <div class="progress-percent" id="percentText">0%</div>
                <div class="progress-label">完成率</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 输入区 -->
        <div class="input-section">
          <div class="input-group">
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="m8 12 2.5 2.5L16 9"/></svg>
              <label class="sr-only" for="todoInput">新任务</label>
              <input type="text" id="todoInput" placeholder="写下你的下一个任务..." autocomplete="off" />
            </div>
            <button class="add-btn" id="addBtn" type="button" title="添加任务" aria-label="添加任务">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
            </button>
          </div>
        </div>

        <!-- 过滤 -->
        <div class="filters">
          <button class="filter-btn active" type="button" data-filter="all" aria-pressed="true">
            <svg class="filter-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h6v6H4z"/><path d="M14 4h6v6h-6z"/><path d="M4 14h6v6H4z"/><circle cx="17" cy="17" r="3"/></svg>
            <span>全部</span>
          </button>
          <button class="filter-btn" type="button" data-filter="active" aria-pressed="false">
            <svg class="filter-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.2-8.6"/><path d="M21 3v6h-6"/></svg>
            <span>进行中</span>
          </button>
          <button class="filter-btn" type="button" data-filter="completed" aria-pressed="false">
            <svg class="filter-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/></svg>
            <span>已完成</span>
          </button>
        </div>

        <!-- 任务列表 -->
        <ul class="todo-list" id="todoList"></ul>

        <!-- 底部 -->
        <div class="footer">
          <span id="countText">0 个任务</span>
          <button class="clear-btn" id="clearDone" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6M10 10v6M14 10v6"/></svg>
            <span>清除已完成</span>
          </button>
        </div>
      </div>

      <!-- 侧边栏 -->
      <div class="side-col">
        <!-- 日期时间 -->
        <div class="side-card datetime-widget">
          <div class="side-card-title">
            <svg class="side-card-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
            <span>现在</span>
          </div>
          <div class="datetime-date" id="dateDisplay"></div>
          <div class="datetime-time" id="timeDisplay"></div>
          <div class="datetime-weekday" id="weekdayDisplay"></div>
        </div>

        <!-- 主题切换 -->
        <div class="side-card theme-switcher-card">
          <div class="side-card-title">
            <svg class="side-card-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="13.5" cy="6.5" r="1"/><circle cx="17.5" cy="10.5" r="1"/><circle cx="8.5" cy="7.5" r="1"/><circle cx="6.5" cy="12.5" r="1"/><path d="M12 3a9 9 0 0 0 0 18h1.5a1.5 1.5 0 0 0 0-3H12a2 2 0 0 1 0-4h4.5A4.5 4.5 0 0 0 21 9.5C21 5.9 17 3 12 3Z"/></svg>
            <span>主题</span>
          </div>
          <div class="theme-options">
            <button class="theme-btn active" data-theme="cyber" title="赛博朋克" aria-pressed="true">
              <span class="theme-swatch swatch-cyber"></span>
              <span class="theme-label">赛博</span>
            </button>
            <button class="theme-btn" data-theme="midnight" title="极简暗黑" aria-pressed="false">
              <span class="theme-swatch swatch-midnight"></span>
              <span class="theme-label">暗黑</span>
            </button>
            <button class="theme-btn" data-theme="light" title="清新浅色" aria-pressed="false">
              <span class="theme-swatch swatch-light"></span>
              <span class="theme-label">浅色</span>
            </button>
            <button class="theme-btn" data-theme="warm" title="暖色调" aria-pressed="false">
              <span class="theme-swatch swatch-warm"></span>
              <span class="theme-label">暖色</span>
            </button>
            <button class="theme-btn" data-theme="forest" title="翡翠森林" aria-pressed="false">
              <span class="theme-swatch swatch-forest"></span>
              <span class="theme-label">森系</span>
            </button>
            <button class="theme-btn" data-theme="ocean" title="深海海洋" aria-pressed="false">
              <span class="theme-swatch swatch-ocean"></span>
              <span class="theme-label">海洋</span>
            </button>
          </div>
        </div>

        <!-- 统计 -->
        <div class="side-card stats-card">
          <div class="side-card-title">
            <svg class="side-card-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19V9"/><path d="M10 19V5"/><path d="M16 19v-7"/><path d="M22 19H2"/></svg>
            <span>统计</span>
          </div>
          <div class="stat-board">
            <div class="stat-box">
              <span class="stat-box-num" id="statTotal">0</span>
              <span class="stat-box-label">总任务</span>
            </div>
            <div class="stat-box">
              <span class="stat-box-num" id="statDone">0</span>
              <span class="stat-box-label">已完成</span>
            </div>
            <div class="stat-box">
              <span class="stat-box-num" id="statActive">0</span>
              <span class="stat-box-label">进行中</span>
            </div>
            <div class="stat-box">
              <span class="stat-box-num" id="statSubs">0</span>
              <span class="stat-box-label">子任务</span>
            </div>
          </div>
          <div class="stat-bar-wrap">
            <div class="stat-bar-bg">
              <div class="stat-bar-fill" id="statBarFill" style="width: 0%"></div>
            </div>
            <span class="stat-bar-text" id="statBarText">0%</span>
          </div>
        </div>

        <!-- 激励语 -->
        <div class="side-card quote-card">
          <div class="side-card-title">
            <svg class="side-card-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M8.5 14.5A7 7 0 1 1 15.5 14.5c-.9.7-1.5 1.5-1.5 2.5h-4c0-1-.6-1.8-1.5-2.5Z"/></svg>
            <span>每日一句</span>
          </div>
          <div class="quote-text" id="quoteText">Stay hungry, stay foolish.</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
