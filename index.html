<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todolist</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>
  <div class="particles" id="particles"></div>

  <div class="app-layout">
    <div class="app-inner">
      <!-- 主列 -->
      <div class="main-col">
        <div class="header">
          <h1>Todolist</h1>
          <p class="subtitle">任务管理，简约高效</p>
        </div>

        <!-- 进度环 -->
        <div class="progress-ring">
          <div class="ring-wrapper">
            <svg viewBox="0 0 140 140">
              <defs>
                <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#00d4ff" />
                  <stop offset="100%" stop-color="#a855f7" />
                </linearGradient>
              </defs>
              <circle class="bg" cx="70" cy="70" r="60" />
              <circle class="fill" id="progressCircle" cx="70" cy="70" r="60"
                      stroke-dasharray="377" stroke-dashoffset="377" />
            </svg>
            <div class="progress-text">
              <div class="progress-percent" id="percentText">0%</div>
              <div class="progress-label">完成率</div>
            </div>
          </div>
        </div>

        <!-- 输入区 -->
        <div class="input-section">
          <div class="input-group">
            <div class="input-wrapper">
              <input type="text" id="todoInput" placeholder="写下你的下一个任务..." />
            </div>
            <button class="add-btn" id="addBtn">+</button>
          </div>
        </div>

        <!-- 过滤 -->
        <div class="filters">
          <button class="filter-btn active" data-filter="all">📋 全部</button>
          <button class="filter-btn" data-filter="active">🔥 进行中</button>
          <button class="filter-btn" data-filter="completed">✅ 已完成</button>
        </div>

        <!-- 任务列表 -->
        <ul class="todo-list" id="todoList"></ul>

        <!-- 底部 -->
        <div class="footer">
          <span id="countText">0 个任务</span>
          <button class="clear-btn" id="clearDone">🗑️ 清除已完成</button>
        </div>
      </div>

      <!-- 侧边栏 -->
      <div class="side-col">
        <!-- 日期时间 -->
        <div class="side-card datetime-widget">
          <div class="side-card-title">🕐 现在</div>
          <div class="datetime-date" id="dateDisplay"></div>
          <div class="datetime-time" id="timeDisplay"></div>
          <div class="datetime-weekday" id="weekdayDisplay"></div>
        </div>

        <!-- 主题切换 -->
        <div class="side-card theme-switcher-card">
          <div class="side-card-title">🎨 主题</div>
          <div class="theme-options">
            <button class="theme-btn active" data-theme="cyber" title="赛博朋克">
              <span class="theme-swatch swatch-cyber"></span>
              <span class="theme-label">赛博</span>
            </button>
            <button class="theme-btn" data-theme="midnight" title="极简暗黑">
              <span class="theme-swatch swatch-midnight"></span>
              <span class="theme-label">暗黑</span>
            </button>
            <button class="theme-btn" data-theme="light" title="清新浅色">
              <span class="theme-swatch swatch-light"></span>
              <span class="theme-label">浅色</span>
            </button>
            <button class="theme-btn" data-theme="warm" title="暖色调">
              <span class="theme-swatch swatch-warm"></span>
              <span class="theme-label">暖色</span>
            </button>
            <button class="theme-btn" data-theme="forest" title="翡翠森林">
              <span class="theme-swatch swatch-forest"></span>
              <span class="theme-label">森系</span>
            </button>
            <button class="theme-btn" data-theme="ocean" title="深海海洋">
              <span class="theme-swatch swatch-ocean"></span>
              <span class="theme-label">海洋</span>
            </button>
          </div>
        </div>

        <!-- 统计 -->
        <div class="side-card">
          <div class="side-card-title">📊 统计</div>
          <div class="stat-grid">
            <div class="stat-box">
              <span class="stat-box-num blue" id="statTotal">0</span>
              <span class="stat-box-label">总任务</span>
            </div>
            <div class="stat-box">
              <span class="stat-box-num green" id="statDone">0</span>
              <span class="stat-box-label">已完成</span>
            </div>
            <div class="stat-box">
              <span class="stat-box-num orange" id="statActive">0</span>
              <span class="stat-box-label">进行中</span>
            </div>
            <div class="stat-box">
              <span class="stat-box-num pink" id="statSubs">0</span>
              <span class="stat-box-label">子任务</span>
            </div>
          </div>
          <div class="stat-bar-wrap">
            <div class="stat-bar-bg">
              <div class="stat-bar-fill" id="statBarFill" style="width: 0%"></div>
            </div>
            <span class="stat-bar-text" id="statBarText">0%</span>
          </div>
        </div>

        <!-- 激励语 -->
        <div class="side-card">
          <div class="side-card-title">💡 每日一句</div>
          <div class="quote-text" id="quoteText">Stay hungry, stay foolish.</div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
